# fly.toml app configuration file generated for workers-test-api on 2026-05-16T19:48:54Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'workers-test-api'
primary_region = 'lhr'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 512
